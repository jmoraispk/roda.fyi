<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roda · Segment Confirm</title>
<style>
  :root{--bg:#0e0b09;--panel:#16110d;--panel2:#1d1711;--line:#2a2017;--ink:#ece3d2;
    --mut:#9c8e79;--gold:#eba63c;--good:#7fc36b;--mid:#e2c044;--bad:#d2502a;
    --mono:ui-monospace,Consolas,monospace}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:14px/1.45 system-ui,sans-serif;display:flex;flex-direction:column;height:100vh}
  header{display:flex;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  header b{letter-spacing:.04em} .sp{flex:1}
  button,select,input{font:inherit;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:6px 10px}
  button{cursor:pointer} button.gold{background:var(--gold);color:#1a130a;font-weight:700;border-color:var(--gold)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;background:#000;min-height:0;overflow:hidden;position:relative}
  .vidwrap{position:relative;display:inline-flex;max-width:100%;max-height:100%}
  video{max-width:100%;max-height:100%;display:block}
  #ov{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
  .timeline{position:relative;height:48px;background:var(--panel2);border-top:1px solid var(--line);overflow-x:auto;overflow-y:hidden;user-select:none}
  .timeline::-webkit-scrollbar{height:8px} .timeline::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  .track{position:relative;height:100%;min-width:100%;cursor:crosshair}
  .blk{position:absolute;top:3px;height:34px;border-radius:5px;border:1px solid #0006;overflow:hidden;
    font:11px/1.3 var(--mono);color:#1a130a;padding:4px 6px;cursor:pointer;white-space:nowrap}
  .blk.sel{outline:2px solid #fff;z-index:3} .blk.bad{opacity:.4}
  .blk .h{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;z-index:2} .blk .h.l{left:0} .blk .h.r{right:0}
  .blk .h:hover{background:#ffffff66}
  #prev{position:absolute;top:3px;height:34px;border-radius:5px;background:#ffffff22;border:1px dashed var(--gold);pointer-events:none;display:none}
  .playhead{position:absolute;top:0;width:2px;height:100%;background:#fff;pointer-events:none;z-index:4}
  .tlbar{display:flex;gap:8px;align-items:center;padding:6px 16px;border-top:1px solid var(--line);background:var(--panel)}
  .tlbar button{padding:3px 11px}
  .ctl{display:flex;flex-direction:column;gap:7px;padding:10px 16px;border-top:1px solid var(--line);background:var(--panel)}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lab{color:var(--mut);font-family:var(--mono);font-size:12px;min-width:74px}
  .tag{cursor:pointer;padding:6px 12px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font:inherit}
  .tag.on{outline:2px solid #fff;font-weight:700}
  small{color:var(--mut);font-family:var(--mono)}
  .ctl code,.tlbar code{color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 7px;font-family:var(--mono);font-size:12px}
  .ctl code[data-jump]{cursor:pointer} .ctl code[data-jump]:hover{border-color:var(--gold)}
  .ctl .nb{padding:4px 9px}
  #selrow.off{opacity:.4}
</style></head><body>
<header><b>RODA · SEGMENT</b><span class="sp"></span>
  <label title="raw footage (the .mp4 you recorded)"><small>video</small> <input type="file" id="vid" accept="video/mp4"></label>
  <label title="capture/segments.json — the move INTERVALS you label here (start/end + move + camera + quality)"><small>segments</small> <input type="file" id="seg" accept="application/json"></label>
  <label title="out/*.image.track.json — the per-frame POSE KEYPOINTS from the model, drawn as the skeleton overlay (read-only here)"><small>track</small> <input type="file" id="trk" accept="application/json"></label>
  <button id="defaults" title="auto-load video + image track + capture/segments.json from the server">↻ defaults</button>
  <button id="restore" title="restore your last unsaved draft from this browser">restore draft</button>
  <button id="clear">Clear all</button>
  <button class="gold" id="export">Export JSON</button>
</header>
<div class="stage"><div class="vidwrap"><video id="v" controls></video><canvas id="ov"></canvas></div></div>
<div class="tlbar">
  <button id="pp" title="play / pause (space)">▶</button>
  <button id="back1" title="back one frame (←)">◀ 1f</button>
  <button id="fwd1" title="forward one frame (→)">1f ▶</button>
  <code id="clock">0:00.00 · f0</code>
  <span class="lab" style="min-width:auto;margin-left:14px">zoom</span>
  <button id="zoomout" title="zoom out">&minus;</button>
  <small id="zoomlvl">1×</small>
  <button id="zoomin" title="zoom in (Ctrl/⌘ + scroll over the timeline)">+</button>
  <button id="zoomfit" title="fit the whole video">fit</button>
  <span class="sp"></span>
  <small id="status" style="color:var(--gold)"></small>
  <small style="margin-left:12px">drag / n = new · [ ] = set in/out · click = seek · Esc = deselect · scroll = pan</small>
</div>
<div class="timeline" id="tl"><div class="track" id="track"><div class="playhead" id="ph"></div></div></div>
<div class="ctl">
  <div class="row">
    <span class="lab">1 · move</span>
    <select id="move"></select>
    <small id="cov" title="camera angles with a GOOD rep for the picked move"></small>
    <span class="lab" style="margin-left:14px">2 · camera</span><span id="faceTags"></span>
    <span class="lab" style="min-width:auto;margin-left:14px">seg</span>
    <button class="nb" id="newseg" title="n key — start a NEW segment at the playhead">+ new</button>
    <button class="nb" id="markin" title="[ key — set the SELECTED segment's start to the playhead">[ in</button>
    <button class="nb" id="markout" title="] key — set the SELECTED segment's end to the playhead">out ]</button>
    <span class="sp"></span>
    <small id="covtot" title="moves with all 4 camera angles covered"></small>
  </div>
  <div class="row" id="selrow">
    <span class="lab">selection</span>
    <span class="lab" style="min-width:auto">start</span>
    <button class="nb" id="sminus" title="start −1 frame (also [ )">−1f</button>
    <code id="sstart" data-jump="start" title="click to jump the playhead here">—</code>
    <button class="nb" id="splus" title="start +1 frame">+1f</button>
    <span class="lab" style="min-width:auto;margin-left:12px">end</span>
    <button class="nb" id="eminus" title="end −1 frame">−1f</button>
    <code id="send" data-jump="end" title="click to jump the playhead here">—</code>
    <button class="nb" id="eplus" title="end +1 frame">+1f</button>
    <span class="lab" style="min-width:auto;margin-left:10px">dur</span><code id="sdur">—</code>
    <span class="lab" style="min-width:auto;margin-left:16px">quality</span>
    <select id="quality"><option>good</option><option>ok</option><option>bad</option></select>
    <span class="lab" style="min-width:auto">stance</span>
    <select id="stance"><option>ginga</option><option>paralela</option><option>stand</option></select>
    <span class="sp"></span><small id="info"></small>
  </div>
</div>
<script>
const SLUGS=["ginga","bencao","meia-lua-de-frente","armada","au"];
const LABELM={ginga:"ginga",bencao:"bençao","meia-lua-de-frente":"meia-lua",armada:"armada",au:"aú"};
const FAC=["front","left","back","right"];
const FCOL={front:"#7fc36b",left:"#5ea0ff",back:"#d28a4a",right:"#eba63c"};
let fps=30, segs=[], sel=-1;
let activeMove=SLUGS[0], activeFace="front";   // the "brush" applied to new (or selected) intervals
const v=document.getElementById('v'), tl=document.getElementById('tl'), track=document.getElementById('track'), ph=document.getElementById('ph');
const moveSel=document.getElementById('move'), faceTagsEl=document.getElementById('faceTags');
const cov=document.getElementById('cov'), covtot=document.getElementById('covtot');
moveSel.innerHTML=SLUGS.map(s=>`<option value="${s}">${LABELM[s]||s}</option>`).join('');
faceTagsEl.innerHTML=FAC.map(f=>`<button class="tag fc" data-f="${f}" style="background:${FCOL[f]};color:#1a130a">${f}</button>`).join(' ');
function refreshTags(){
  moveSel.value=activeMove;
  faceTagsEl.querySelectorAll('.fc').forEach(b=>b.classList.toggle('on',b.dataset.f===activeFace));
}
// picking a move / camera sets the brush; if an interval is selected it also re-tags it.
moveSel.onchange=()=>{ activeMove=moveSel.value; if(sel>=0)segs[sel].move=activeMove; draw(); saveDraft(); };
faceTagsEl.querySelectorAll('.fc').forEach(b=>b.onclick=()=>{ activeFace=b.dataset.f; if(sel>=0)segs[sel].facing=activeFace; b.blur(); refreshTags(); draw(); saveDraft(); });
refreshTags();
document.getElementById('vid').onchange=e=>{const f=e.target.files[0]; if(f) v.src=URL.createObjectURL(f);};
document.getElementById('seg').onchange=e=>{const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{const j=JSON.parse(r.result); fps=j.fps||30; segs=j.segments||[]; draw();}; r.readAsText(f);};
// pose track.json -> 2D skeleton overlay (so you can confirm move/facing/quality visually)
let TRK=null;
const ov=document.getElementById('ov'), octx=ov.getContext('2d');
const RIGHT={12:1,14:1,16:1,24:1,26:1,28:1,32:1};
const BONES=[[11,12,'m'],[23,24,'m'],[11,23,'m'],[12,24,'m'],[0,11,'m'],[0,12,'m'],
  [11,13,'l'],[13,15,'l'],[12,14,'r'],[14,16,'r'],
  [23,25,'l'],[25,27,'l'],[27,31,'l'],[24,26,'r'],[26,28,'r'],[28,32,'r']];
const COLB={l:'#5ea0ff',r:'#eba63c',m:'#cbb89a'};
document.getElementById('trk').onchange=e=>{const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{const j=JSON.parse(r.result); TRK=j.frames||null; if(j.fps)fps=j.fps;}; r.readAsText(f);};
// --- auto-load known files from the server so you don't have to browse each time.
//     served from the repo root, so these are absolute server paths.
const DEFAULTS={
  video:'/videos/first_5_moves.mp4',
  track:'/tools/mocap/out/first_5_moves.image.track.json',
  segments:'/tools/mocap/capture/segments.json',
};
const DRAFT_KEY='roda_seg_draft_first5';
const statusEl=document.getElementById('status');
function setStatus(t){ statusEl.textContent=t; }
function saveDraft(){ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({fps,segments:segs,ts:Date.now()})); }catch(e){} }
async function fetchJSON(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(u+' '+r.status); return r.json(); }
async function loadDefaults(){
  v.src=DEFAULTS.video;
  try{ const t=await fetchJSON(DEFAULTS.track); TRK=t.frames||null; if(t.fps)fps=t.fps; }
  catch(e){ console.warn('track:',e.message); }
  try{ const s=await fetchJSON(DEFAULTS.segments); fps=s.fps||fps; segs=s.segments||[]; setStatus('loaded segments.json'); }
  catch(e){ console.warn('segments:',e.message); segs=[]; setStatus('no segments.json yet — starting empty'); }
  sel=-1; draw();
}
function restoreDraft(){
  let d=null; try{ d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null'); }catch(e){}
  if(!d||!d.segments){ setStatus('no draft saved in this browser'); return; }
  fps=d.fps||fps; segs=d.segments; sel=-1; draw();
  setStatus(`restored draft · ${segs.length} segs · ${new Date(d.ts).toLocaleTimeString()}`);
}
document.getElementById('defaults').onclick=loadDefaults;
document.getElementById('restore').onclick=restoreDraft;
v.addEventListener('loadedmetadata',draw);   // reposition timeline blocks once duration is known
if(location.protocol.startsWith('http')) loadDefaults();   // file:// can't fetch, so only auto-load when served
function drawOverlay(){
  const cw=v.clientWidth, ch=v.clientHeight;
  if(ov.width!==cw)ov.width=cw; if(ov.height!==ch)ov.height=ch;
  octx.clearRect(0,0,cw,ch);
  if(!TRK||!v.videoWidth)return;
  const fr=TRK[Math.round(v.currentTime*fps)]; if(!fr||!fr.img)return;
  const vw=v.videoWidth, vh=v.videoHeight, sc=Math.min(cw/vw,ch/vh);
  const dw=vw*sc, dh=vh*sc, ox=(cw-dw)/2, oy=(ch-dh)/2;
  const P=fr.img.map(p=>[ox+p[0]*dw, oy+p[1]*dh]);
  octx.lineWidth=3; octx.lineCap='round';
  BONES.forEach(([a,b,s])=>{ if(!P[a]||!P[b])return; octx.strokeStyle=COLB[s];
    octx.beginPath(); octx.moveTo(P[a][0],P[a][1]); octx.lineTo(P[b][0],P[b][1]); octx.stroke(); });
  for(let i=0;i<P.length;i++){ if(i>0&&i<11)continue;
    octx.fillStyle=(i in RIGHT)?'#eba63c':(i===0?'#fff':'#5ea0ff');
    octx.beginPath(); octx.arc(P[i][0],P[i][1],i===0?5:3,0,7); octx.fill(); }
}
function updateCov(){
  // one GOOD rep per camera angle per move. Scales to any number of moves:
  //  - the colored F L B R readout is for the move you've picked,
  //  - each dropdown option carries its own coverage, and a total sits on the right.
  const FACO=['front','left','back','right'], L={front:'F',left:'L',back:'B',right:'R'};
  const have={};
  segs.filter(s=>s.quality==='good').forEach(s=>{(have[s.move]=have[s.move]||new Set()).add(s.facing);});
  const set=have[activeMove]||new Set();
  cov.innerHTML=FACO.map(f=>`<span style="color:${set.has(f)?'var(--good)':'var(--mut)'}">${L[f]}</span>`).join(' ');
  let done=0;
  [...moveSel.options].forEach(o=>{ const st=have[o.value]||new Set();
    o.textContent=`${LABELM[o.value]||o.value}   ${FACO.map(f=>st.has(f)?L[f]:'x').join('')}`;
    if(st.size>=4)done++; });
  covtot.textContent=`${done}/${moveSel.options.length} done`;
}
function draw(){
  updateCov();
  [...track.querySelectorAll('.blk')].forEach(b=>b.remove());
  const D=v.duration||(segs.length?Math.max(...segs.map(s=>s.end))/fps:1);
  segs.forEach((s,i)=>{const b=document.createElement('div'); b.className='blk'+(i===sel?' sel':'')+(s.quality==='bad'?' bad':'');
    b.style.left=(100*s.start/fps/D)+'%'; b.style.width=Math.max(0.8,100*(s.end-s.start)/fps/D)+'%';
    b.style.background=FCOL[s.facing]||'#888';
    b.textContent=`${LABELM[s.move]||s.move}·${(s.facing||'?')[0].toUpperCase()}${s.quality!=='good'?' '+s.quality:''}`;
    b.title=`${s.move} · ${s.facing} · ${s.quality}`;
    b.onmousedown=ev=>ev.stopPropagation();   // click a block to edit it; don't start a new-interval drag
    b.onclick=ev=>{ev.stopPropagation(); sel=i; activeMove=s.move; activeFace=s.facing;
      stance.value=s.startStance||'ginga'; quality.value=s.quality||'good'; refreshTags(); sync(); draw();};   // select only — leave the cursor where it is
    const hl=document.createElement('div'), hr=document.createElement('div');   // drag a block edge to resize it
    hl.className='h l'; hr.className='h r';
    hl.onmousedown=ev=>{ev.stopPropagation(); ev.preventDefault(); edge={i,which:'start'}; sel=i; selectBrush(i); sync(); draw();};
    hr.onmousedown=ev=>{ev.stopPropagation(); ev.preventDefault(); edge={i,which:'end'}; sel=i; selectBrush(i); sync(); draw();};
    b.appendChild(hl); b.appendChild(hr);
    track.appendChild(b);});
  sync();
}
function fmt(frame){ const t=frame/fps, m=Math.floor(t/60), s=t-m*60; return `${m}:${s.toFixed(2).padStart(5,'0')}`; }
function sync(){
  const has=sel>=0; selrow.classList.toggle('off',!has);
  if(!has){ sstart.textContent='—'; send.textContent='—'; sdur.textContent='—';
    info.innerHTML=`<span style="color:var(--gold)">new →</span> ${LABELM[activeMove]||activeMove} · ${activeFace} &nbsp;<small>(+ new / n / drag to start a segment here)</small>`; return; }
  const s=segs[sel];
  sstart.textContent=`${fmt(s.start)} · f${s.start}`;
  send.textContent=`${fmt(s.end)} · f${s.end}`;
  sdur.textContent=`${((s.end-s.start)/fps).toFixed(2)}s`;
    info.innerHTML=`<span style="color:#fff">editing #${sel}</span> · ${LABELM[s.move]} · ${s.facing} &nbsp;<small>([ / ] set start/end to cursor · ±1f fine trims · Del remove · Esc deselect)</small>`;
}
document.getElementById('stance').onchange=()=>{ if(sel>=0){segs[sel].startStance=stance.value; saveDraft();} };
document.getElementById('quality').onchange=()=>{ if(sel>=0){segs[sel].quality=quality.value; draw(); saveDraft();} };
// no-overlap clamping: a boundary can never cross a neighbouring interval (capoeira = one move at a time)
function leftBound(i){ let lb=0; segs.forEach((o,j)=>{ if(j!==i && o.start<segs[i].start) lb=Math.max(lb,o.end); }); return lb; }
function rightBound(i){ let rb=Infinity; segs.forEach((o,j)=>{ if(j!==i && o.start>segs[i].start) rb=Math.min(rb,o.start); }); return rb; }
// shared-boundary ripple: if an edge touches a neighbour, that neighbour's edge moves with it
// (capoeira is back-to-back: one move's end IS the next move's start, so the shared cut slides as one).
function setStart(i,f){ const s=segs[i];
  const nb=segs.find((o,j)=>j!==i && o.end===s.start);   // left neighbour sharing this cut
  const lo=nb?nb.start+1:leftBound(i);
  f=Math.max(lo,Math.min(f,s.end-1));
  if(nb) nb.end=f;                                        // slide the shared cut together → no overlap, no gap
  s.start=f; }
function setEnd(i,f){ const s=segs[i];
  const nb=segs.find((o,j)=>j!==i && o.start===s.end);   // right neighbour sharing this cut
  const hi=nb?nb.end-1:rightBound(i);
  f=Math.min(hi,Math.max(f,s.start+1));
  if(nb) nb.start=f;                                      // slide the shared cut together → no overlap, no gap
  s.end=f; }
// precise per-frame editing of the selected interval's endpoints
const selrow=document.getElementById('selrow'), sstart=document.getElementById('sstart'),
      send=document.getElementById('send'), sdur=document.getElementById('sdur');
function nudge(field,delta){ if(sel<0)return; const s=segs[sel];
  if(field==='start') setStart(sel,s.start+delta); else setEnd(sel,s.end+delta);
  v.currentTime=(field==='start'?s.start:s.end)/fps;   // jump playhead so the overlay shows the edited frame
  draw(); saveDraft(); }
document.getElementById('sminus').onclick=()=>nudge('start',-1);
document.getElementById('splus').onclick=()=>nudge('start',1);
document.getElementById('eminus').onclick=()=>nudge('end',-1);
document.getElementById('eplus').onclick=()=>nudge('end',1);
sstart.onclick=()=>{ if(sel>=0)v.currentTime=segs[sel].start/fps; };   // click a timestamp to jump there
send.onclick=()=>{ if(sel>=0)v.currentTime=segs[sel].end/fps; };
// --- mark in / out, decoupled from the cursor ---
function curF(){ return Math.round(v.currentTime*fps); }
function selectBrush(i){ const s=segs[i]; activeMove=s.move; activeFace=s.facing;
  stance.value=s.startStance||'ginga'; quality.value=s.quality||'good'; refreshTags(); }
// create a new ~30-frame segment at the playhead, shrunk to the free gap; select it.
function newSeg(){
  const F=curF();
  const inside=segs.findIndex(o=>F>=o.start && F<o.end);
  if(inside>=0){ sel=inside; selectBrush(inside); sync(); draw(); setStatus('cursor is inside a segment — selected it'); return; }
  let rb=Infinity; segs.forEach(o=>{ if(o.start>F) rb=Math.min(rb,o.start); });   // next segment after the cursor
  const end=Math.min(F+30, rb);
  if(end-F<1){ setStatus('no room for a new segment here'); return; }
  segs.push({i:segs.length,start:F,end,move:activeMove,facing:activeFace,rep:0,startStance:stance.value,quality:quality.value});
  sel=segs.length-1; draw(); saveDraft();
}
// [ in / out ] = resize the SELECTED segment's start/end to the playhead (move that edge to the cursor).
// if nothing is selected, fall back to the obvious segment: the one under the cursor, else the nearest.
function pickFor(which){
  if(sel>=0) return sel;
  const F=curF();
  const inside=segs.findIndex(o=>F>=o.start && F<o.end); if(inside>=0) return inside;
  let b=-1, bs=(which==='end')?-Infinity:Infinity;
  segs.forEach((o,i)=>{ if(which==='end'){ if(o.start<=F && o.start>bs){bs=o.start;b=i;} }   // last segment at/before the cursor
                        else if(o.start>=F && o.start<bs){bs=o.start;b=i;} });                // first segment at/after the cursor
  return b;
}
function markIn(){ const i=pickFor('start');
  if(i<0){ setStatus('nothing to mark — use + new (or n) to start a segment'); return; }
  sel=i; selectBrush(i); const f=curF(); setStart(i,f);
  setStatus(segs[i].start===f?'start → cursor':'start clamped at a neighbour'); sync(); draw(); saveDraft(); }
function markOut(){ const i=pickFor('end');
  if(i<0){ setStatus('nothing to mark — use + new (or n) to start a segment'); return; }
  sel=i; selectBrush(i); const f=curF(); setEnd(i,f);
  setStatus(segs[i].end===f?'end → cursor':'end clamped at a neighbour — clear it to extend further'); sync(); draw(); saveDraft(); }
document.getElementById('newseg').onclick=newSeg;
document.getElementById('markin').onclick=markIn;
document.getElementById('markout').onclick=markOut;
// --- draw an interval by dragging across the timeline (captures the current move + camera brush) ---
const prev=document.createElement('div'); prev.id='prev'; track.appendChild(prev);
let drag=null, edge=null;
function tlTime(clientX){ const r=track.getBoundingClientRect(); const D=v.duration||1; return Math.max(0,Math.min(D,(clientX-r.left)/r.width*D)); }
track.addEventListener('mousedown',e=>{ if(e.target!==track)return; drag={t0:tlTime(e.clientX),x0:e.clientX,moved:false}; });
window.addEventListener('mousemove',e=>{
  if(edge){ const f=Math.round(tlTime(e.clientX)*fps);   // dragging a block edge → live resize (clamped + rippled)
    if(edge.which==='start') setStart(edge.i,f); else setEnd(edge.i,f); draw(); return; }
  if(!drag)return; if(Math.abs(e.clientX-drag.x0)>3)drag.moved=true;
  const D=v.duration||1, t1=tlTime(e.clientX), a=Math.min(drag.t0,t1), b=Math.max(drag.t0,t1);
  prev.style.display='block'; prev.style.left=(100*a/D)+'%'; prev.style.width=(100*(b-a)/D)+'%'; });
window.addEventListener('mouseup',e=>{ if(edge){ edge=null; saveDraft(); return; }
  if(!drag)return; const d=drag; drag=null; prev.style.display='none';
  if(!d.moved){ v.currentTime=d.t0; return; }            // plain click = seek only (selection persists; Esc deselects)
  const t1=tlTime(e.clientX), a=Math.min(d.t0,t1), b=Math.max(d.t0,t1);
  let start=Math.round(a*fps), end=Math.max(start+1,Math.round(b*fps));
  // keep the new interval inside the free gap so it never overlaps an existing label
  let lb=0, rb=Infinity; segs.forEach(o=>{ if(o.end<=start)lb=Math.max(lb,o.end); if(o.start>=end)rb=Math.min(rb,o.start);
    if(o.start<end&&o.end>start){ if(o.start>=start)rb=Math.min(rb,o.start); else lb=Math.max(lb,o.end); } });
  start=Math.max(start,lb); end=Math.min(end,rb);
  if(end-start<1){ setStatus('no room there — overlaps an existing label'); draw(); return; }
  segs.push({i:segs.length,start,end,move:activeMove,facing:activeFace,rep:0,startStance:stance.value,quality:quality.value});
  sel=segs.length-1; v.currentTime=start/fps; draw(); saveDraft(); });
// --- timeline zoom + pan (a 7-min clip needs finer control) ---
const zoomin=document.getElementById('zoomin'), zoomout=document.getElementById('zoomout'),
      zoomfit=document.getElementById('zoomfit'), zoomlvl=document.getElementById('zoomlvl');
let zoom=1;
function applyZoom(){ zoom=Math.max(1,Math.min(64,zoom)); track.style.width=(zoom*100)+'%'; zoomlvl.textContent=(Math.round(zoom*10)/10)+'×'; }
function centerOnTime(t){ const D=v.duration||1; tl.scrollLeft=(t/D)*track.clientWidth - tl.clientWidth/2; }
function scrollToFrame(f){ if(zoom<=1)return; const D=v.duration||1, px=(f/fps/D)*track.clientWidth;
  if(px<tl.scrollLeft+12 || px>tl.scrollLeft+tl.clientWidth-12) centerOnTime(f/fps); }
zoomin.onclick=()=>{ zoom*=2; applyZoom(); centerOnTime(v.currentTime); };
zoomout.onclick=()=>{ zoom/=2; applyZoom(); centerOnTime(v.currentTime); };
zoomfit.onclick=()=>{ zoom=1; applyZoom(); tl.scrollLeft=0; };
tl.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){ e.preventDefault(); const tBefore=tlTime(e.clientX); zoom*=(e.deltaY<0?1.25:0.8); applyZoom();
    const D=v.duration||1; tl.scrollLeft=(tBefore/D)*track.clientWidth - (e.clientX-tl.getBoundingClientRect().left); }
  else if(e.deltaY){ e.preventDefault(); tl.scrollLeft+=e.deltaY; }
},{passive:false});
applyZoom();
// --- transport: play/pause + single-frame stepping (precise scrubbing) ---
const pp=document.getElementById('pp'), clock=document.getElementById('clock');
function step(df){ v.pause(); v.currentTime=Math.max(0,Math.min(v.duration||1e9,(Math.round(v.currentTime*fps)+df)/fps)); }
document.getElementById('back1').onclick=()=>step(-1);
document.getElementById('fwd1').onclick=()=>step(1);
pp.onclick=()=>{ v.paused?v.play():v.pause(); };
v.addEventListener('play',()=>pp.textContent='⏸'); v.addEventListener('pause',()=>pp.textContent='▶');
function tick(){ const D=v.duration||1, F=Math.round(v.currentTime*fps), px=(v.currentTime/D)*track.clientWidth;
  ph.style.left=(100*v.currentTime/D)+'%'; clock.textContent=`${fmt(F)} · f${F}`;
  if(zoom>1 && !v.paused && (px<tl.scrollLeft+20 || px>tl.scrollLeft+tl.clientWidth-20)) centerOnTime(v.currentTime);
  drawOverlay(); requestAnimationFrame(tick);} tick();
addEventListener('keydown',e=>{
  if(/^(SELECT|INPUT|TEXTAREA)$/.test(e.target.tagName))return;
  const F=Math.round(v.currentTime*fps);
  if(e.key===' '){e.preventDefault(); v.paused?v.play():v.pause();}
  else if(e.key==='ArrowRight'){e.preventDefault(); v.currentTime+=1/fps;}
  else if(e.key==='ArrowLeft'){e.preventDefault(); v.currentTime-=1/fps;}
  else if(e.key==='['){ markIn(); }     // set start of selected (does not create)
  else if(e.key===']'){ markOut(); }    // set end of selected (does not create)
  else if(e.key==='n'){ newSeg(); }     // new segment at the playhead
  else if((e.key==='Delete'||e.key==='Backspace') && sel>=0){segs.splice(sel,1); sel=-1; draw(); saveDraft();}
  else if(e.key==='Escape'){ sel=-1; draw(); }
});
document.getElementById('clear').onclick=()=>{ if(confirm('Clear all segments? (start a fresh labeling pass)')){ segs=[]; sel=-1; draw(); saveDraft(); } };
document.getElementById('export').onclick=()=>{
  segs.forEach((s,i)=>s.i=i);
  const blob=new Blob([JSON.stringify({file:'first_5_moves.mp4',fps,segments:segs},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='segments.json'; a.click();
};
</script></body></html>
